<!DOCTYPE html>
<html>
<head>
  <title>Meu Site</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: #00ff00;
      font-family: monospace;
      overflow-x: hidden;
    }

    .tela {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 32px;
      text-align: center;
    }

    .hidden {
      opacity: 0;
      transform: translateY(50px);
      transition: 1s;
    }

    .show {
      opacity: 1;
      transform: translateY(0);
    }

    .segunda {
      font-size: 22px;
      padding: 40px;
      color: white;
    }

    /* efeito digitando */
    .typing {
      border-right: 2px solid #00ff00;
      white-space: nowrap;
      overflow: hidden;
      width: 0;
      animation: typing 3s steps(30, end) forwards, blink 0.5s infinite;
    }

    @keyframes typing {
      to { width: 100%; }
    }

    @keyframes blink {
      50% { border-color: transparent; }
    }
  </style>
</head>

<body>

  <!-- Tela inicial -->
  <div class="tela">
    <div class="typing">SUA CONTA DO INSTAGRAM FOI HACKEADA KKKKKKKKKKK CONFIOU PORQUE QUIS.</div>
  </div>

  <!-- Segunda parte -->
  <div class="tela segunda hidden" id="secao2">
    ⚠️ TINHA QUE SER UM JEGUE.<br><br>
    Não clique em links suspeitos KKKKKKKKKKKKKKK.
  </div>

  <script>
    const secao = document.getElementById("secao2");

    window.addEventListener("scroll", () => {
      const pos = secao.getBoundingClientRect().top;
      const tela = window.innerHeight;

      if (pos < tela - 100) {
        secao.classList.add("show");
      }
    });
  </script>

</body>
</html>
