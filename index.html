<!DOCTYPE html>
<html>
<head>
  <title>Hacker Style</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: #00ff00;
      font-family: monospace;
      overflow: auto;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }

    .center {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 40px;
    }

    .typing {
      border-right: 2px solid #00ff00;
      white-space: nowrap;
      overflow: hidden;
      width: 0;
      animation: typing 3s steps(20, end) forwards, blink 0.5s infinite;
    }

    @keyframes typing {
      to { width: 100%; }
    }

    @keyframes blink {
      50% { border-color: transparent; }
    }

    /* glitch effect */
    .glitch {
      color: white;
      font-size: 30px;
      position: relative;
      animation: glitch 1s infinite;
    }

    @keyframes glitch {
      0% { text-shadow: 2px 0 red; }
      20% { text-shadow: -2px 0 blue; }
      40% { text-shadow: 2px 2px red; }
      60% { text-shadow: -2px -2px blue; }
      80% { text-shadow: 2px 0 red; }
      100% { text-shadow: 0 0 white; }
    }

    .baixo {
      text-align: center;
      padding: 60px 20px;
    }

    .imagens {
      display: flex;
      justify-content: center;
      gap: 60px;
      margin-top: 30px;
      opacity: 0;
      transform: translateY(50px);
      transition: 1s;
    }

    .imagens.show {
      opacity: 1;
      transform: translateY(0);
    }

    .imagens img {
      width: 180px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <!-- fundo hacker -->
  <canvas id="matrix"></canvas>

  <!-- topo -->
  <div class="center">
    <div class="typing">CONTA DO INTAGRAM HACKEADA NINGUEM MANDOU CONFIAR KKKKKKKKKKKKKKK</div>
  </div>

  <!-- parte de baixo -->
  <div class="baixo">
    <div class="glitch">NAO CLICA EM LINKS ESTRANHOS BETINHA</div>

    <div class="imagens" id="imgs">
      <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Cat03.jpg">
      <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Cat03.jpg">
    </div>
  </div>

  <script>
    // efeito matrix
    const canvas = document.getElementById("matrix");
    const ctx = canvas.getContext("2d");

    canvas.height = window.innerHeight;
    canvas.width = window.innerWidth;

    const letters = "01";
    const fontSize = 14;
    const columns = canvas.width / fontSize;

    const drops = [];

    for (let i = 0; i < columns; i++) {
      drops[i] = 1;
    }

    function draw() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#0F0";
      ctx.font = fontSize + "px monospace";

      for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
          drops[i] = 0;

        drops[i]++;
      }
    }

    setInterval(draw, 33);

    // mostrar imagens ao rolar
    window.addEventListener("scroll", () => {
      const imgs = document.getElementById("imgs");
      const pos = imgs.getBoundingClientRect().top;

      if (pos < window.innerHeight) {
        imgs.classList.add("show");
      }
    });
  </script>

</body>
</html>
