<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Frases</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f4f4f4;
      padding: 50px;
    }

    #box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      display: inline-block;
    }

    button {
      padding: 10px 20px;
      border: none;
      background: #007BFF;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 20px;
    }

    button:hover {
      background: #0056b3;
    }

    #frase {
      font-size: 18px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <div id="box">
    <h2>💬 Clique para se animar </h2>
    <button onclick="gerarFrase()">Gerar frase</button>
    <p id="frase"></p>
  </div>

  <script>
    const frases = [
      "Acredite em você!",
      "Nunca desista dos seus sonhos.",
      "Cada dia é uma nova oportunidade.",
      "Você é mais forte do que pensa.",
      "O sucesso vem com a persistência.",
      "as pequenas loças nao se lavam sozinhas:D"
    ];

    function gerarFrase() {
      const aleatoria = Math.floor(Math.random() * frases.length);
      document.getElementById("frase").innerText = frases[aleatoria];
    }
  </script>

</body>
</html>
